<html>
<head>
    <title>FlaChat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<style>
    .wrapper {
        display: flex;
        gap: 12px;
        width: 95%;
        max-width: 900px;
    }

    .chat-container {
        background-color: rgba(55,55,55,0.5);
        flex: 1;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
    }

    #chat-box {
        flex: 1;
        overflow-y: auto;
        min-height: 300px;
        max-height: 60vh;
        margin-bottom: 10px;
        text-align: left;
    }

    #chat-box p { margin: 4px 0; }

    #message-form {
        display: flex;
        gap: 8px;
    }

    #message-form input {
        flex: 1;
        display: inline;
        width: auto;
        margin: 0;
        -webkit-text-fill-color: white;
    }

    .sidebar {
        background-color: rgba(55,55,55,0.5);
        border: 2px solid white;
        border-radius: 10px;
        padding: 10px 14px;
        min-width: 140px;
    }

    .sidebar h3 {
        font-size: 0.9rem;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.4);
        padding-bottom: 4px;
    }

    #user-list { list-style: none; padding: 0; margin: 0; }
    #user-list li {
        font-size: 0.85rem;
        padding: 3px 0;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    #user-list li::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #5f5;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .top-bar small a { font-size: 0.8rem; }
</style>

<!-- Pannello creazione ruolo -->
<div id="role-creator" style="display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:999;">
    <div style="background:rgba(40,40,40,0.97); border:2px solid white;
        border-radius:12px; padding:30px; text-align:center; min-width:280px;">
        <h3 style="margin-bottom:16px;">Crea ruolo: <span id="role-creator-name" style="color:#aef;"></span></h3>
        <label style="display:block; margin-bottom:8px; opacity:0.8;">Scegli un colore</label>
        <input type="color" id="role-color-picker" value="#ffffff"
            style="width:80px; height:80px; border:none; border-radius:50%;
            cursor:pointer; background:none; padding:0;">
        <br><br>
        <div style="display:flex; gap:12px; justify-content:center;">
            <button onclick="confirmRole()">✅ Crea</button>
            <button onclick="closeRoleCreator()">❌ Annulla</button>
        </div>
    </div>
</div>

<script>
    let pendingRoleName = null;

    socket.on('open_role_creator', data => {
        pendingRoleName = data.role_name;
        document.getElementById('role-creator-name').textContent = data.role_name;
        document.getElementById('role-color-picker').value = '#ffffff';
        document.getElementById('role-creator').style.display = 'flex';
    });

    function conf_role() {
        if (!pendingRoleName) return;
        const color = document.getElementById('role-color-picker').value;
        socket.emit('create_role', {
            room, 
            role_name: pendingRoleName,
            color
        });
        closeRoleCreator();
    }

    function closeRoleCreator() {
        document.getElementById('role-creator').style.display = 'none';
        pendingRoleName = null;
    }
</script>

<body>
    <div class="wrapper">
        <div class="chat-container">
            <div class="top-bar">
                <span>Stanza <strong>#{{ room }}</strong> — loggato come <strong>{{ username }}</strong></span>
                <small><a href="/logout">Esci</a> | <a href="/lobby">Cambia stanza</a></small>
            </div>

            <div id="chat-box"></div>

            <form id="message-form">
                <input type="text" id="message" placeholder="Scrivi un messaggio..." autocomplete="off" required>
                <button type="submit">Invia</button>
            </form>
        </div>

        <div class="sidebar">
            <h3>🟢 Online</h3>
            <ul id="user-list"></ul>
        </div>
    </div>

    <script>
        const socket = io();
        const username = "{{ username }}";
        const room = "{{ room }}";

        socket.emit('join', { username, room });

        socket.on('message', data => {
            if (data.type === "banned") {
                setTimeout(() => {
                    window.location.href = "/lobby?banned=1";
                }, 2000);
                const box = document.getElementById('chat-box');
                const p = document.createElement('p');
                p.innerHTML = `<span style="color:red; font-weight:bold;">Sei stato bannato da questa stanza. Verrai reindirizzato alla lobby tra un paio di secondi...</span>`;
                box.appendChild(p);
                return;
            }

            const box = document.getElementById('chat-box');
            const p = document.createElement('p');

            if (data.type === "chat") {
                p.innerHTML = `<span style="color:${data.color}; font-weight:bold;">${data.username}</span>: ${data.msg}`;
            } else if (data.type === "system") {
                p.innerHTML = `<span style="opacity:0.7; font-style:italic;">${data.msg}</span>`;
            }

            box.appendChild(p);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('update_users', users => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';

            users.forEach(u => {
                const li = document.createElement('li');
                let icon = "";
                if (u.role === "owner") icon = "👑";
                if (u.role === "admin") icon = "🛡️";
                if (u.role === "mod") icon = "🔧";
                li.style.color = u.color;
                li.textContent = `${icon} ${u.username}`;
                list.appendChild(li);
            });
        });

        document.getElementById('message-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (msg !== "") {
                socket.emit('message', { username, room, msg });
                input.value = "";
            }
        });
    </script>
</body>
</html>
